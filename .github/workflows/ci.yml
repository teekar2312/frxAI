name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: ESLint
        run: bun run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate

      - name: TypeScript Check
        run: bunx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: frxai_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate
        env:
          DATABASE_URL: mysql://root:test@127.0.0.1:3306/frxai_test

      - name: Run Tests
        run: bun run test
        env:
          DATABASE_URL: mysql://root:test@127.0.0.1:3306/frxai_test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: frxai_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: bun run db:generate
        env:
          DATABASE_URL: mysql://root:test@127.0.0.1:3306/frxai_test

      - name: Push DB schema
        run: bun run db:push
        env:
          DATABASE_URL: mysql://root:test@127.0.0.1:3306/frxai_test

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: mysql://root:test@127.0.0.1:3306/frxai_test